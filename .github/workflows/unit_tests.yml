name: Unit tests

on:
  pull_request:
    branches: ["main"]
    paths:
      - "**.dart"
      - "pubspec.yaml"
      - ".github/workflows/**"

  push:
    branches: ["main"]
    paths:
      - "**.dart"
      - "pubspec.yaml"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit_test:
    name: Run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Run unit tests
        run: dart test
